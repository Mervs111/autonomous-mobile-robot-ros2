# =====================================================================
# AMR Mobile Robot Ackermann - RTAB-Map LOCALIZATION mode
# =====================================================================
# Mode ini dipakai SAAT DEMO autonomous navigation dengan map existing.
# Database .db yang dihasilkan dari mapping mode di-load read-only.
# RTAB-Map akan track robot di peta tanpa menambahkan node baru.
# =====================================================================

# FIX: section name harus match node name 'rtabmap' di launch file
rtabmap:
  ros__parameters:

    frame_id: base_link
    map_frame_id: map
    odom_frame_id: odom

    subscribe_depth: false
    subscribe_rgbd:  true
    subscribe_scan:  true
    approx_sync: true
    approx_sync_max_interval: 0.05
    queue_size: 30
    sync_queue_size: 30

    tf_delay: 0.05
    tf_tolerance: 0.1
    publish_tf: true

    database_path: ~/.ros/rtabmap.db
    Mem/IncrementalMemory: "false"       # KEY DIFFERENCE: localization mode
    Mem/InitWMWithAllNodes: "true"       # load semua node dari DB

    # FIX: konsisten dengan rtabmap_mapping.yaml (Vis+ICP, bukan ICP-only)
    # ICP-only sulit relocalize karena tidak pakai visual features dari DB.
    Reg/Strategy: "2"
    Reg/Force3DoF: "true"
    Icp/PointToPlane: "true"
    Icp/VoxelSize: "0.05"
    Icp/MaxCorrespondenceDistance: "0.1"

    Vis/FeatureType: "8"
    Vis/MaxFeatures: "1000"
    # FIX 20 Jun: turunkan 10 → 6. MinInliers 10 bikin lock kedip (id 33 → 0)
    # karena area sudah agak beda dgn saat mapping → fitur cocok tapi < 10
    # inlier ditolak. 6 cukup buat lock stabil tanpa false positive.
    Vis/MinInliers: "6"

    # Localization khusus: lebih banyak proximity check
    RGBD/ProximityBySpace: "true"
    RGBD/ProximityByTime: "false"
    RGBD/LocalRadius: "5.0"
    RGBD/ProximityMaxGraphDepth: "50"
    RGBD/ProximityPathMaxNeighbors: "10"
    # FIX 20 Jun: LoopThr 0.11 → 0.05 (lebih agresif terima loop closure),
    # DetectionRate 1.0 → 2.0 (cek 2x/detik → re-lock lebih cepat & nempel).
    # Akar masalah "maju malah mundur": map->odom heading kebalik karena lock
    # tidak stabil. Lock nempel = heading benar TANPA mapping ulang.
    Rtabmap/LoopThr: "0.05"
    Rtabmap/DetectionRate: "2.0"

    publish_cloud_obstacles: true
    publish_cloud_ground: true
    publish_grid_map: true

    # FIX: aktifkan gravity constraint juga di localization
    # (sebelumnya 0 — tidak konsisten dengan mapping)
    Optimizer/GravitySigma: "0.3"


rgbd_sync:
  ros__parameters:
    # FIX: RealSense hardware-synced — approx_sync harus false
    # (sebelumnya true, kontradiksi dgn ROS Wiki recommendation)
    approx_sync: false
    approx_sync_max_interval: 0.03
    queue_size: 30
    depth_scale: 1.0
